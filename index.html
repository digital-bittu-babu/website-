<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaGrowX</title>
 <link rel="wevsite icon" type="png" href="image.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a2b8c;
    --teal: #00c9a7;
    --green: #3aff6c;
    --dark: #0d1224;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #1a2b8c, transparent);
    top: -150px; left: -150px;
    animation-delay: 0s;
  }
  .blob2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #00c9a7, transparent);
    bottom: -100px; right: -100px;
    animation-delay: -4s;
  }
  .blob3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #3aff6c44, transparent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -8s;
  }
  @keyframes drift {
    from { transform: scale(1) translate(0, 0); }
    to   { transform: scale(1.15) translate(30px, 20px); }
  }

  /* Grid lines overlay */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: min(420px, 92vw);
    background: rgba(13, 18, 36, 0.7);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 48px 36px 44px;
    text-align: center;
    backdrop-filter: blur(24px);
    box-shadow:
      0 0 0 1px rgba(0,201,167,0.1),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Glow ring behind logo */
  .logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #1a2b8c, #00c9a7, #3aff6c, #1a2b8c);
    opacity: 0.3;
    filter: blur(18px);
    animation: spin 6s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .logo-wrap img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: contain;
    background: #fff;
    padding: 12px;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,201,167,0.25);
  }

  /* Brand name */
  .brand {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.6rem;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #fff 30%, #00c9a7 70%, #3aff6c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .tagline {
    font-size: 0.82rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, #00c9a7, #3aff6c);
    border-radius: 2px;
    margin: 0 auto 32px;
    animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Buttons */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 24px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
  }
  .link-btn:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); }
  .link-btn:hover::before { background: rgba(255,255,255,0.06); }
  .link-btn:active { transform: translateY(0) scale(0.98); }

  /* Individual button styles */
  .btn-instagram {
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    color: #fff;
    box-shadow: 0 8px 24px rgba(253, 29, 29, 0.3);
    animation: fadeUp 0.8s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .btn-facebook {
    background: linear-gradient(135deg, #1877f2, #0d52b2);
    color: #fff;
    box-shadow: 0 8px 24px rgba(24, 119, 242, 0.3);
    animation: fadeUp 0.8s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .btn-website {
    background: linear-gradient(135deg, #00c9a7, #3aff6c);
    color: #0d1224;
    box-shadow: 0 8px 24px rgba(0, 201, 167, 0.3);
    font-weight: 600;
    animation: fadeUp 0.8s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Icons */
  .icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
    fill: currentColor;
  }

  /* Footer */
  .footer {
    margin-top: 32px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
    animation: fadeUp 0.8s 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .footer span {
    background: linear-gradient(90deg, #00c9a7, #3aff6c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #00c9a7;
    opacity: 0;
    animation: floatUp var(--dur) ease-in var(--delay) infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0); }
    20%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }

  .rathor{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    width: 28px;
    border-radius: 50%;
    /* margin-left: 20px; */
  }

</style>
</head>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 30}%;
      --dur: ${3 + Math.random() * 5}s;
      --delay: ${Math.random() * 6}s;
      background: ${Math.random() > 0.5 ? '#00c9a7' : '#3aff6c'};
      width: ${2 + Math.random() * 3}px;
      height: ${2 + Math.random() * 3}px;
    `;
    container.appendChild(p);
  }
</script>
